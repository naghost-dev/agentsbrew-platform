# kagent-app.yaml
  apiVersion: argoproj.io/v1alpha1
  kind: Application
  metadata:
    name: kagent
    namespace: argocd
    annotations:
      argocd.argoproj.io/sync-wave: "2"    # se instala después de los CRDs
    finalizers:
      - resources-finalizer.argocd.argoproj.io
  spec:
    project: default
    source:
      repoURL: ghcr.io/kagent-dev/kagent/helm
      chart: kagent
      targetRevision: "0.7.0"
      helm:
        values: |
          providers:
            default: ollama
            
    destination:
      server: https://kubernetes.default.svc
      namespace: ai-agents
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
      syncOptions:
        - CreateNamespace=true




