# agentsbrew-app.yaml
  apiVersion: argoproj.io/v1alpha1
  kind: Application
  metadata:
    name: agentsbrew
    namespace: argocd
  spec:
    project: default
    source:
      repoURL: https://github.com/naghost-dev/agentsbrew-platform.git
      targetRevision: feature/argocd-setup
      path: apps/
    destination:
      server: https://kubernetes.default.svc
      namespace: argocd
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
      syncOptions:
        - CreateNamespace=true